<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SKT Open2u 구매시스템</title>
        <!-- css -->
        <link rel="stylesheet" href="../../resource/css/jquery-ui.css" />
        <link rel="stylesheet" href="../../resource/css/jquery-ui.theme.css" />
        <link rel="stylesheet" href="../../resource/css/ui.jqgrid.css" />
        <link rel="stylesheet" href="../../resource/css/alopex3/alopex_grid.css" />
        <link rel="stylesheet" href="../../resource/css/ui.common.css" />
        <!-- javascript -->
        <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
        <script src="../../resource/lib/jQuery/jquery-ui.js"></script>
        <script src="../../resource/lib/jQuery/jquery.jqgrid.min.js"></script>
        <script src="../../resource/lib/Alopex/alopex-grid.min.js"></script>
        <script src="../../resource/lib/Alopex/alpopex_data.js"></script>
        <script src="../../resource/js/ui.common.js"></script>
    </head>

    <body>
        <!-- wrap : S -->
        <div class="login_wrap">
            <div class="login_intro_area">
                <div class="login_intro_box">
                    <h2 class="login_intro">
                        <strong>Open<span>2</span>U</strong>에 <br>
                        방문하신 것을 환영합니다.
                    </h2>
                </div>
            </div>
            <div class="login_inpt_area">
                <div class="login_inpt_box">
                    <div class="login_inpt_top">
                        <h3>Login <span>관리자 로그인 화면입니다</span></h3>
                    </div>
                    <ul class="login_inpt_list">
                        <li><input type="text" class="userid" placeholder="아이디를 입력해주세요"></li>
                        <li><input type="password" class="userpw" placeholder="비밀번호를 입력해주세요"></li>
                    </ul>
                    <div class="login_inpt_btn">
                        <button type="button">로그인</button>
                    </div>
                    <p class="login_copy">COPYRIGHT © SK TELECOM. ALL RIGHTS RESERVED.</p>
                </div>
            </div>
        </div>
        <!-- // wrap : S -->
    </body>
</html>
