    </head>
    <body>
        <div class="popwrap">
            <div class="pop_header_area">
                <div class="pop_top_area">
                    <div class="left">
                        <h2 class="pop_title">설문 관리</h2>
                    </div>
                    <div class="right">

                </div>
                <div class="pop_sub_area">
                    <div class="left"></div>
                    <div class="right">
                        <button type="button" class="btn pop pop_save c_type07">저장</button>
                    </div>
                </div>
            </div>
            <div class="popcontents p_top170">
                <div class="appraisal_title m_t0">
                    <div class="left"><h3 class="title">설문건명</h3></div>
                    <div class="right">
                        <ul class="sub_info">
                            <li>
                                <span class="label">설문번호</span>
                            </li>
                            <li>
                                <strong class="info">1234123</strong>
                            </li>
                        </ul>
                    </div>
                </div>
                
                <div class="poptitle">
                    <div class="btnArea f_right">
                        <button type="button" class="btn c_type08"><i class="icons i_btn_add"></i> 신규등록</button>
                        <button type="button" class="btn c_type08"><i class="icons i_btn_remove"></i> 삭제</button>
                        <button type="button" class="btn c_type08">수정</button>
                    </div>
                </div>
                <table class="tableStyle">
                	<colgroup>
                		<col style="width:145px">
                		<col> 
                		<col style="width:145px">
                		<col>
                	</colgroup>
                    <tbody>
                        <tr>
                            <th>중분류 <span class="staricon"></span></th>
                            <td>
                                <select class="w160">
                                    <option>전체</option>
                                </select>
                            </td>
                            <th>SG <span class="staricon"></span></th>
                            <td>
                                <select class="w160">
                                    <option>전체</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>평가분류 <span class="staricon"></span></th>
                            <td>
                                <select class="w160">
                                    <option>전체</option>
                                </select>
                            </td>
                            <th>평가항목 <span class="staricon"></span></th>
                            <td>
                                <select class="w160">
                                    <option>전체</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>평가문항 <span class="staricon"></span></th>
                            <td>
                                <select class="w160">
                                    <option>전체</option>
                                </select>
                            </td>
                            <th>배점 <span class="staricon"></span></th>
                            <td>
                                <select class="w160">
                                    <option>전체</option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="poptitle">
                    <div class="points_inpt">
                        <h3>배점합계</h3>
                        <input type="text" class="w40">
                        <span class="point_msg">(※ 기준점수: 100점)</span>
                    </div>
                </div>
                <div class="grid_area">
                    <div id="alopex-grid" class="alopexgrid"></div>
                </div>

                <div class="poptitle">
                    <h3>설문 참고파일</h3>
                </div>
                <table class="tableStyle">
                    <colgroup>
                        <col width="5px">
                        <col width="*">
                    </colgroup>
                    <thead>
                        <tr><th><input type="checkbox" id="attFrmMultiatt_file_chk_all" name="att_file_chk_all" value="0"></th>
                        <th>파일</th>
                    </tr></thead>
                    <tbody name="test" id="att_file_tbl_body">
                        <tr>
                            <td colspan="2" class="t_left">
                                
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <a href="javascript:;" class="btn_top"><i class="icons i_btn_top"></i></a>
        <script>
            var mydata = [
                { data1: "data1", data2: "data", data3: "data", data4: "data", data5: "data", data6: "data", data7: "data", data8: "data", data9: "data", data10: "data"},
                { data1: "data1", data2: "data", data3: "data", data4: "data", data5: "data", data6: "data", data7: "data", data8: "data", data9: "data", data10: "data"},
                { data1: "data1", data2: "data", data3: "data", data4: "data", data5: "data", data6: "data", data7: "data", data8: "data", data9: "data", data10: "data"},
                { data1: "data1", data2: "data", data3: "data", data4: "data", data5: "data", data6: "data", data7: "data", data8: "data", data9: "data", data10: "data"},
                { data1: "data1", data2: "data", data3: "data", data4: "data", data5: "data", data6: "data", data7: "data", data8: "data", data9: "data", data10: "data"},
            ];

            $(document).ready(function () {
                $(".jqgrid").jqGrid({
                    datatype: "local",
                    // data: mydata,
                    autowidth: true,
                    cellEdit:true,
                    shrinkToFit:false,
                    forceFit:true,
                    pager: '#jqGridPager',
                    colModel: [
                        { label: 'data1', name: 'data1', width:100, editable:true },
                        { label: 'data2', name: 'data2', width:100, editable:true },
                        { label: 'data3', name: 'data3', width:100, editable:true },
                        { label: 'data4', name: 'data4', width:100, editable:true },
                        { label: 'data5', name: 'data5', width:100, editable:true },
                        { label: 'data6', name: 'data6', width:100, editable:true },
                        { label: 'data7', name: 'data7', width:100, editable:true },
                        { label: 'data8', name: 'data8', width:100, editable:true },
                        { label: 'data9', name: 'data9', width:100, editable:true },
                        { label: 'data10', name: 'data10', width:100, editable:true },
                    ],
                    // jQGrid 데이터 없는 경우
                    loadComplete: function() {
                        if ($(".jqgrid").getGridParam("records")==0) {
                            $(".jqgrid").addRowData(
                            $(".jqgrid")
                                .empty()
                                .append('<tr><td><div class="grid_status nodata">데이터가 존재하지 않습니다.</div></td></tr>')
                            );
                        }
                    }
                });

            });

            $(window).bind('resize', function() {
                $(".jqgrid").setGridWidth($('.grid_area').width());
            }).trigger('resize');
        </script>
    </body>
</html>
