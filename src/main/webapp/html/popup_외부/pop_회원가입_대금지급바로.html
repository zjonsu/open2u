<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SKT Open2u 구매시스템</title>
        <!-- css -->
        <link rel="stylesheet" href="../../resource/css/jquery-ui.css" />
        <link rel="stylesheet" href="../../resource/css/jquery-ui.theme.css" />
        <link rel="stylesheet" href="../../resource/css/ui.jqgrid.css" />
        <link rel="stylesheet" href="../../resource/css/alopex3/alopex_grid.css" />
        <link rel="stylesheet" href="../../resource/css/ui.common.css" />
        <!-- javascript -->
        <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
        <script src="../../resource/lib/jQuery/jquery-ui.js"></script>
        <script src="../../resource/lib/jQuery/jquery.jqgrid.min.js"></script>
        <script src="../../resource/lib/Alopex/alopex-grid.min.js"></script>
        <script src="../../resource/lib/Alopex/alpopex_data.js"></script>
        <script src="../../resource/js/ui.common.js"></script>
    </head>

    <body>
        <div class="pop_header_area">
            <div class="pop_top_area">
                <div class="left">
                    <h2 class="pop_title">회원가입</h2>
                </div>
                <div class="right"></div>
            </div>
        </div>
        <div class="popcontents">
            <ul class="member_join_step">
                <li class="off">
                    <div class="member_step step01">
                        <span>약관동의</span>
                    </div>
                </li>
                <li class="off">
                    <div class="member_step step02">
                        <span>회원인증</span>
                    </div>
                </li>
                <li class="off">
                    <div class="member_step step03">
                        <span>기본정보</span>
                    </div>
                </li>
                <li class="off">
                    <div class="member_step step04">
                        <span>거래희망영역</span>
                    </div>
                </li>
                <li class="on">
                    <div class="member_step step05">
                        <span>대금지급바로</span>
                    </div>
                </li>
            </ul>
            
            <div>
                <ul class="transaction_item_list sty02">
                    <li>
                        <div class="transaction_item_tit">
                            <h3 class="tit">대금지급바로란?</h3>
                            <span>(舊 중소기업 Care Program)</span>
                        </div>
                        <div class="transaction_item_detail">
                            <p class="transaction_desc">
                                중소기업 기준을 충족하며, 프로그램에 가입된 경우 거래규모와 무관하게 자금부서의 지출 승인 완료 후
                                익일 대금이 지급되는 프로그램
                            </p>
                            <div class="transaction_img m_t25">
                                <img src="../../resource/images/new_common/img_transaction07.svg" alt="">
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="transaction_item_tit">
                            <h3 class="tit">대금지급바로 신청 <br> Process</h3>
                        </div>
                        <div class="transaction_item_detail">
                            <div class="transaction_img">
                                <img src="../../resource/images/new_common/img_transaction08.svg" alt="">
                            </div>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="pop_bot_btn border">
                <div class="left"></div>
                <div class="right">
                    <button type="button" class="btn pop pop_save c_type07">다음</button>
                </div>
            </div>
        </div>

    </body>
</html>
