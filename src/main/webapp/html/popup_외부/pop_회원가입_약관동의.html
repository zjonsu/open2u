제 1 장 총 칙

제1조 (목 적)
이 약관은 SK텔레콤 주식회사 (이하 '회사'라 함)이 운영하는 “전자구매 &amp; 파트너관리 웹사이트”
『SK Telecom-Procurement &amp; Partner Management System, URL 주소 : http://open2u.sktelecom.com』(이하 '본 사이트'라 함)을 이용함에 있어 회사와 이용자의 권리, 의무 및 책임사항 등 기본적인 사항을 규정함을 목적으로 합니다.

제2조 (약관의 효력 및 명시)
① 이 약관은 서비스를 이용하고자 하는 모든 회원에 대하여 그 효력을 발생합니다.
② 이 약관의 내용은 서비스 화면에 게시하거나 기타의 방법으로 회원에게 공시하고, 이에 동의한 회원이 서비스에 가입함으로써 효력이 발생합니다.
③ 회사는 이 약관의 내용과 상호, 영업소 소재지, 대표자의 성명 등을 이용자가 알 수 있도록 회사의 초기 서비스화면(전면)에 게시합니다

제3조 (약관의 개정)
① 회사는 "약관의 규제에 관한 법률", "전자거래기본법", "전자서명법", "정보통신망이용촉진등에관한법률(이하'정보통신망이용촉진법')", "소비자보호법" 등 관련법을 위배하지 않는 범위 내에서 임의로 이 약관을 개정할 수 있습니다.
② 회사는 필요하다고 인정되는 경우 이 약관을 변경할 수 있으며, 약관이 변경된 경우에는 적용일자 및 개정 사유를 명시하여 현행 약관과 함께 개정 내용을 본 사이트의 초기화면에 그 적용일자 7일 이전부터 적용일자 전일까지 공지합니다. 다만, 이용자의 권리 또는 의무에 관한 중요한 규정의 변경은 최소한 7일전에 공시합니다.
③ 회사가 약관을 개정한 경우에는 그 개정약관은 그 적용 일자 이후에 체결되는 계약에만 적용되고 그 이전에 이미 체결된 계약에 대해서는 개정전의 약관조항이 그대로 적용됩니다. 다만 이미 계약을 체결한 이용자가 개정약관 조항의 적용을 받기를 원하는 뜻을 제2항에 의한 개정약관의 공지기간 내에 회사에 송신하여 회사의 동의를 받은 경우에는 개정약관 조항이 적용됩니다
④ 이 약관에서 정하지 아니한 사항과 이 약관의 해석에 관하여는 정부가 제정한 전자거래소비자보호지침 및 관계법령 또는 상관례에 따릅니다
⑤ 이용자는 개정된 약관 사항에 동의하지 않으면 서비스 이용을 중단하고 이용 계약을 해지할 수 있습니다.

제4조 (약관 외 준칙)
이 약관에 명시되지 않은 사항에 대해서는 전기통신기본법, 전기통신사업법 등 관계법령, 회사의 서비스 이용 지침 등의 규정에 의합니다.


제5조 (용어의 정의)
① 이 약관에서 사용하는 용어의 정의는 다음과 같습니다.
가. 이용자: 본 사이트에 접속하여 이 약관에 따라 회사가 제공하는 서비스를 이용하는 회원 및 비회원
나. 회원: 사이트에 접속하여 이 약관에 동의하고, ID(고유번호)와 Password(비밀번호)를 발급받은 SK텔레콤 파트너(개인, 개인사업자, 법인사업자)
다. ID(고유번호): 회원 식별과 회원의 서비스 이용을 위하여 회원이 선정하고 회사가 승인하는 영문자와 숫자의 조합으로, 하나의 사업자등록번호에 대표 ID와 사업자 소속의 개인이 사용할 수 있는 개인 ID 10개만 발급하여 이용 가능, 개인 ID는 대표ID가 승인 관리함
라. PASSWORD(비밀번호): 회원의 정보 보호를 위해 회원 자신이 설정한 문자와 숫자의 조합
마. 운영자: 서비스의 전반적인 관리와 원활한 운영을 위하여 회사가 선정한 자
바. 서비스 중지: 정상 이용 중 회사가 정한 일정한 요건에 따라 일정기간 동안 서비스의 제공을 중지하는 것
② 이 약관에서 사용하는 용어의 정의는 제1항에서 정하는 것을 제외하고는 관계 법령 및 서비스별 안내에서 정하는 바에 의합니다.

제 2 장 서비스 이용 계약

제6조(회원가입)
① 이용자는 회사가 정한 방법으로 이용신청서를 작성한 후 이 약관에 " 이용약관에 동의하십니까?" 라는 이용 신청시의 물음에 고객이 "동의" 버튼을 누르면 약관에 동의하는 것으로 간주됩니다.
② 회사는 제1항과 같이 회원으로 가입할 것을 신청한 이용자 중 다음 각 호에 해당하는 이용자에 대하여는 서비스의 제공을 거부하거나 제한할 수 있습니다.
가. 기입한 내용을 허위로 작성하였거나 기재를 누락하거나 오기가 있는 경우
나. 사회적 통념상 공공의 질서 및 사회 미풍양속을 해할 목적으로 신청한 경우
다. 회사의 정당한 업무 수행에 지장을 주는 경우
라. 기타 회원으로 등록하는 것이 회사의 기술상 현저히 지장이 있다고 판단되거나 이용신청자의 귀책사유로 이용승낙이 곤란한 경우
③ 회원가입계약의 성립 시기는 회사의 승낙이 회원에게 도달한 시점으로 합니다.
④ 회원은 제1항 또는 본 약관에 의한 등록사항에 변경이 있는 경우, 즉시 전자우편이나 본 사이트에서 정한 방법 등으로 회사에 대하여 그 변경사항을 알려야 합니다.

제7조 (이용 신청)
이용 신청은 서비스의 이용자 등록 화면에서 고객이 다음 사항을 가입신청 양식에 기록하는 방식으로 행합니다.
가. 이름
나. ID(고유번호)
다. Password(비밀번호)
라. 주민등록번호, 사업자등록번호
마. 주소
바. 일반전화번호
사. 이동전화번호
아. E-mail(전자우편) 주소
자. 직장명
차. 기타 회사가 필요하다고 인정하는 사항

제8조 (이용신청의 승낙)
① 회사는 제7조에서 정한 사항을 정확히 기재하여 이용 신청한 고객에 대하여 신청일로부터 1일 이내에 서비스 이용 신청 승낙 여부를 결정하고 그 결과를 고객에게 통지합니다.
② 개인사업자, 법인사업자 소속의 직원이 사용하는 개인 ID는 대표ID 권한자의 승인을 득하면 바로 사용할 수 있습니다.

제9조 (이용신청에 대한 승낙의 제한)
① 회사는 다음 각 호에 해당하는 신청에 대하여는 승낙을 하지 않을 수 있습니다.
가. 실명이 아니거나, 다른 사람의 명의사용 등 이용자 등록 시 허위로 신청하는 경우
나. 이용자 필수 등록 사항을 누락하거나 오기하여 신청하는 경우
다. 사회의 안녕질서 또는 미풍양속을 저해하거나, 저해할 목적으로 신청한 경우
라. 기타 회사가 정한 이용신청 요건이 만족되지 않았을 경우
② 회원의 자격에 따라 서비스 이용의 일부가 제한될 수 있습니다.

제10조 (계약 사항의 변경)
회원은 이용 신청 시 기재한 사항이 변경되었을 경우 회사가 정한 별도의 이용 방법으로 정해진 양식 및 방법에 의하여 수정하여야 합니다.

제11조 (계약해지 및 이용제한)
① 회원이 서비스 이용계약을 해지하고자 할 경우에는 회사가 정한 별도의 이용방법으로 회사에 해지 신청을 하여야 합니다.
② 회사는 회원이 제20조에 규정한 회원의 의무를 이행하지 않을 경우 사전 통지 없이 즉시 이용계약을 해지하거나 또는 서비스 이용을 중지할 수 있습니다.
③ 회사는 회원이 이용계약을 체결하여 ID(고유번호)와 Password(비밀번호)를 부여 받은 후에라도 회원의 자격에 따른 서비스 이용을 제한할 수 있습니다.
④ 회사는 회원 가입 후 6개월 동안 서비스 사용 이력이 없는 회원에 대해 사용의사를 묻는 고지를 하고, 회사가 정한 기한 내에 답변이 없는 경우 이용 계약을 해지할 수 있습니다.
⑤ 본 조 제2항 및 제3항의 회사 조치에 대하여 회원은 본 웹사이트를 통해 이의신청을 할 수 있습니다.
⑥ 본 조 제5항의 이의가 정당하다고 회사가 인정하는 경우, 회사는 즉시 서비스의 이용을 재개합니다.

제 3 장 서비스 이용

제12조 (서비스의 이용 개시)
① 회사는 회원의 이용 신청을 승낙한 때부터 서비스를 개시합니다. 단, 일부 서비스의 경우에는 지정된 일자부터 서비스를 개시합니다.
② 회사의 업무상 또는 기술상의 장애로 인하여 서비스를 개시하지 못하는 경우에는 사이트에 공시하거나 회원에게 이를 통지합니다.

제13조 (서비스의 이용시간)
① 서비스의 이용은 연중무휴 1일 24시간을 원칙으로 합니다. 다만, 회사의 업무 상이나 기술상의 이유로 서비스가 일지 중지될 수 있고, 또한 운영 상의 목적으로 회사가 정한 기간에는 서비스가 일시 중지될 수 있습니다. 이러한 경우 회사는 사전 또는 사후에 이를 공지합니다.
② 회사는 서비스를 일정범위로 분할하여 각 범위별로 이용 가능한 시간을 별도로 정할 수 있으며 이 경우 그 내용을 공지합니다.

제14조 (서비스의 변경 및 중지)
① 회사는 변경될 서비스의 내용 및 제공일자를 제24조 제2항에서 정한 방법으로 회원에게 통지하고 서비스를 변경하여 제공할 수 있습니다.
② 회사는 다음 각 호에 해당하는 경우 서비스의 전부 또는 일부를 제한하거나 중지할 수 있습니다.
가. 서비스용 설비의 보수 등 공사로 인한 부득이한 경우
나. 회원이 회사의 영업활동을 방해하는 경우
다. 정전, 제반 설비의 장애 또는 이용량의 폭주 등으로 정상적인 서비스 이용에 지장이 있는 경우
라. 서비스 제공업자와의 계약 종료 등과 같은 회사의 제반 사정으로 서비스를 유지할 수 없는 경우
마. 기타 천재지변, 국가비상사태 등 불가항력적 사유가 있는 경우
③ 제2항에 의한 서비스 중단의 경우에는 회사가 제24조 제2항에서 정한 방법으로 이용자에게 통지합니다. 다만, 회사가 통제할 수 없는 사유로 인한 서비스의 중단 (운영자의 고의, 과실이 없는 디스크 장애, 시스템 다운 등)으로 인하여 사전 통지가 불가능한 경우에는 그러하지 아니합니다.
④ 회사는 서비스의 변경, 중지로 발생하는 문제에 대해서는 어떠한 책임도 지지 않습니다.

제15조 (정보의 제공 및 광고의 게재)
회사는 서비스를 운영함에 있어 각종 정보 및 광고를 서비스 화면에 게재하거나 e-mail 및 서신우편 등의 방법으로 회원에게 제공할 수 있습니다.

제16조 (게시물 또는 내용물의 삭제)
① 회사는 회원이 게시하거나 전달하는 서비스 내의 모든 내용물(회원간 전달 포함)이 다음 각 호의 경우에 해당한다고 판단되는 경우 사전통지 없이 삭제할 수 있으며, 이에 대해 회사는 어떠한 책임도 지지 않습니다.
가. 회사, 다른 회원 또는 제3자를 비방하거나 중상모략으로 명예를 손상시키는 내용인 경우
나. 공공질서 및 미풍양속에 위반되는 내용의 정보, 문장, 도형 등의 유포에 해당하는 경우
다. 범죄적 행위에 결부된다고 인정되는 내용인 경우
라. 다량의 정보를 전송하여 서비스의 안정적 운영을 방해하는 경우
마. 허위 사실 유포 및 수신자의 의사에 반하는 광고성 정보를 전송하는 경우
바. 회사의 저작권, 제3자의 저작권 등 기타 권리를 침해하는 내용인 경우
사. 제2항 소정의 세부이용지침을 통하여 회사에서 규정한 게시기간을 초과한 경우
아. 회사에서 제공하는 서비스와 관련 없는 내용인 경우
자. 기타 관계 법령 및 회사의 지침 등에 위반된다고 판단되는 경우
② 회사는 게시물에 관련된 세부 이용지침을 별도로 정하여 시행할 수 있으며, 회원은 그 지침에 따라 각종 게시물(회원간 전달 포함)을 등록하거나 삭제하여야 합니다.

제17조 (게시물의 저작권)
① 회원이 서비스 내에 게시한 게시물(회원간 전달 포함)의 저작권은 회원이 소유하며 회사는 서비스 내에 이를 게시할 수 있는 권리를 갖습니다.
② 회사는 게시한 회원의 동의 없이 게시물을 다른 영리적 목적으로 사용할 수 없습니다.
③ 회사는 회원이 서비스 내에 게시한 게시물이 타인의 저작권, 프로그램 저작권 등을 침해하더라도 이에 대한 민∙형사상의 책임을 부담하지 않습니다. 만일 회원이 타인의 저작권, 프로그램저작권 등을 침해하였음을 이유로 회사가 타인으로부터 손해배상청구 등 이의 제기를 받은 경우 회원은 회사의 면책을 위하여 노력하여야 하며, 회사가 면책되지 못한 경우 회원은 그로 인해 회사에 발생한 모든 손해를 부담하여야 합니다.
④ 회사는 회원이 해지하거나 적법한 사유로 해지 된 경우 해당 회원이 게시하였던 게시물을 삭제할 수 있습니다.
⑤ 회사가 작성한 저작물에 대한 저작권은 회사에 귀속합니다.
⑥ 이용자는 서비스를 이용함으로써 얻은 정보를 회사의 사전 승낙 없이 복제, 송신, 출판, 배포, 방송 기타 방법에 의하여 영리목적으로 이용하거나 제3자에게 이용하게 하여서는 아니되며 게시물에 대한 저작권 침해는 관계 법령의 적용을 받습니다.

제18조(자료의 게재, 용량의 제한)
회사는 회원이 제공하는 정보, 자료에 대하여 회사의 공지, 이용안내 등을 통해 일정한 게재 기간이나 자료의 용량을 정할 수 있습니다.

제19조 (양도금지)
회원은 서비스의 이용권한, 기타 이용 계약상 지위를 타인에게 양도, 증여할 수 없으며 게시물에 대한 저작권을 포함한 모든 권리 및 책임은 이를 게시한 회원에게 있습니다.

제 4 장 계약당사자의 의무

제20조 (회원의 의무)
① 회원은 서비스를 이용할 때 다음 각 호의 행위를 하여서는 아니 됩니다.
1. 이용 신청 또는 변경 시 허위 사실을 기재하거나, 다른 회원 ID 및 비밀번호를 도용, 부정하게 사용하는 행위
2. 회사의 서비스 정보를 이용하여 얻은 정보를 복제 또는 유통시키거나 상업적으로 이용하는 행위
3. 고의적으로 타인의 명예를 손상시키거나 불이익을 주는 행위
4. 게시판 등에 음란물을 게재하거나 음란사이트를 연결(링크)하는 행위
5. 회사의 저작권, 제3자의 저작권 등 기타 권리를 침해하는 행위
6. 공공질서 및 미풍양속에 위반되는 내용의 정보, 문장, 도형, 음성 등을 타인에게 유포하는 행위
7. 서비스와 관련된 설비의 오 동작이나 정보 등의 파괴 및 혼란을 유발시키는 컴퓨터 바이러스감염 자료를 등록 또는 유포하는 행위
8. 서비스 운영을 고의로 방해하거나 서비스의 안정적 운영을 방해할 수 있는 정보, 수신자의 명시적인 수신거부 의사에 반하여 광고성 정보를 전송하는 행위
9. 타인으로 가장하는 행위 및 타인과의 관계를 허위로 명시하는 행위
10. 다른 회원의 개인정보를 수집, 저장, 공개하는 행위
11. 범죄행위를 목적으로 하거나 범죄행위를 교사하는 내용 및 저질, 음란성 내용을 유포하는 행위
(기타 사회질서에 위배되는 행위)
12. 자기 또는 타인에게 재산상의 이익을 주거나 타인에게 손해를 가할 목적으로 허위의 정보를 유통시키는 행위
13. 서비스에 게시된 정보를 변경하는 행위
14. 관련 법령에 의하여 그 전송 또는 게시가 금지되는 정보(컴퓨터 프로그램 포함)의 전송 또는 게시 행위
15. 회사 직원이나 운영자를 가장하거나 사칭 또는 타인 명의를 도용하여 글을 게시하거나 메일을 발송하는 행위
16. 정보 서비스를 위해하거나 혼란을 일으키는 해킹을 하거나 컴퓨터 소프트웨어, 하드웨어, 전기통신장비의 정상적인 가동을 방해, 파괴할 목적으로 고안된 소프트웨어 바이러스, 기타 다른 컴퓨터 코드, 파일, 프로그램을 포함하고 있는 자료를 게시하는 행위
17. 기타 관계되는 법령에 위배되는 불법적이거나 부당한 행위
② 회원은 관계 법령, 본 약관의 규정, 이용안내 및 서비스상에 공지한 주의사항, 회사가 통지하는 사항 등을 준수하여야 하며, 기타 회사의 업무에 방해되는 행위를 하여서는 아니 됩니다.
③ 회원은 회사에서 공식적으로 인정한 경우를 제외하고는 서비스를 이용하여 상품을 판매하는 영업 활동을 할 수 없으며 특히 해킹, 광고를 통한 수익, 음란사이트를 통한 상업행위, 상용소프트웨어 불법배포 등을 할 수 없습니다. 이를 위반하여 발생한 영업 활동의 결과 및 손실, 관계기관에 의한 구속 등 법적 조치 등에 관해서는 회사가 책임을 지지 않으며, 회원은 이와 같은 행위와 관련하여 회사에 대하여 손해배상 의무를 집니다.
④ 회원은 서비스 이용을 위해 등록할 경우 현재의 사실과 일치하는 완전한 정보(이하 "회원등록정보")를 제공하여야 합니다.
⑤ 회원은 등록정보에 변경사항이 발생할 경우 즉시 갱신하여야 합니다. 회원이 제공한 등록정보 및 갱신한 등록정보가 부정확할 경우, 기타 회원이 본 조 제1항에 명시된 행위를 한 경우에 회사는 본 서비스 약관 제33조(준거법과 관할법원)에 의해 회원의 서비스 이용을 제한 또는 중지 할 수 있습니다.

제21조 (회원 ID(고유번호)와 Password(비밀번호) 관리에 대한 의무와 책임)
① 회원은 회원 ID(고유번호) 및 Password(비밀번호) 관리를 철저히 하여야 합니다.
② 회원 ID(고유번호)와 Password(비밀번호)의 관리 소홀, 부정 사용에 의하여 발생하는 모든 결과에 대한 책임은 회원 본인에게 있으며, 회사의 시스템 고장 등 회사의 책임 있는 사유로 발생하는 문제에 대해서는 회사가 책임을 집니다.
③ 회원은 본인의 ID(고유번호) 및 Password(비밀번호)를 제3자에게 이용하게 해서는 안되며, 회원 본인의 ID(고유번호) 및 Password(비밀번호)를 도난 당하거나 제3자가 사용하고 있음을 인지하는 경우에는 바로 회사에 통보하고 회사의 안내가 있는 경우 그에 따라야 합니다.
④ 회원의 ID(고유번호)는 회사의 사전 동의 없이 변경할 수 없습니다.
⑤ 회원은 본 약관에서 규정하는 사항 및 주의사항을 준수하여야 합니다

제22조(회원 탈퇴 및 자격 상실 등)
① 회원은 회사에 대하여 본 사이트에서 정한 방법, 서면 또는 전화 등의 방법으로 탈퇴를 요청할 수 있으며, 회사는 탈퇴 요청이 접수되는 경우 그 익일부터 당해 회원에 대하여 서비스를 중지합니다.
② 회사는 회원이 다음 각 호에 해당하는 행위를 하였을 경우에는 사전 통지 없이 회원 자격을 제한하거나 정지시킬 수 있습니다.
가. 타인의 이용자번호(ID) 및 비밀번호를 도용한 경우
나. 이용 가입 시 이용계약에 위반되는 허위사실을 기입하였을 경우
다. 컴퓨터 바이러스를 고의로 유포시켰을 경우
라. 본 사이트를 이용하여 구입한 재화나 용역 등의 대금, 기타 본 사이트의 이용과 관련하여 회원이 부담하는 채무를 이행하지 않는 경우
마. 다른 이용자가 본 사이트를 이용하는 것을 방해하거나 그 정보를 도용하는 등 전자거래질서를 위협하는 경우
바. 본 사이트를 이용하여 기타 관련 법률과 이 약관이 금지하는 행위를 하거나 미풍양속에 반하는 행위를 하는 경우
사. 기타 이 약관의 규정을 위반하는 경우
③ 회사가 회원 자격을 제한 또는 정지시킨 후, 동일한 행위가 2회 이상 반복되거나 30일 이내에 그 사유가 시정되지 아니하는 경우 회사는 회원 자격을 상실시킬 수 있습니다.
④ 회사가 회원자격을 상실시키는 경우에는 회원등록을 말소하며, 이 경우 회원에게 이를 통지하고, 회원등록 말소 전에 소명할 기회를 부여합니다.
⑤ 제2항의 경우, 회사는 회원에게 손해배상을 청구할 수 있습니다.

제23조 (회사의 의무)
① 회사는 서비스 제공과 관련하여 알고 있는 회원의 신상정보를 본인의 승낙 없이 제3자에게 누설, 배포하지 않습니다. 단, 관계법령에 의한 수사상의 목적으로 관계기관으로부터 요구 받은 경우나 정보통신윤리위원회의 요청이 있는 경우 등 법률의 규정에 따른 적법한 절차에 의한 경우에는 그러하지 않습니다.
② 제1항의 범위 내에서, 회사는 업무와 관련하여 회원의 사전 동의 없이 회원 전체 또는 일부의 개인정보에 관한 통계자료를 작성하여 이를 사용할 수 있습니다.
③ 회사가 제공하는 서비스로 인하여 회원에게 손해가 발생한 경우 그러한 손해가 회사의 고의나 중과실에 기해 발생한 경우에 한하여 회사에서 책임을 부담하며, 그 책임의 범위는 통상손해에 한합니다.
④ 회사는 정보통신망 이용촉진 및 정보보호에 관한 법률, 통신비밀보호법, 전기통신사업법 등 서비스의 운영, 유지와 관련 있는 법규를 준수합니다.
⑤ 회사는 지속적이고 안정적인 서비스를 제공하기 위해 노력하여야 합니다.
⑥ 회사는 서비스를 이용하는 회원이 제기하는 의견이나 불만사항이 정당하다고 인정되면 즉시 처리한다.
다만, 즉시 처리가 불가능한 경우에는 회원에게 그 사유와 처리되는 일정을 통지하여야 합니다

제24조 (회원에 대한 통지)
① 회원에 대한 통지를 하는 경우 회사는 회원이 등록한 e-mail주소 또는 SMS 등으로 할 수 있습니다.
② 회사는 불특정 다수 회원에 대한 통지의 경우, 1주일 이상 회사의 서비스 게시판 등에 게시함으로써 개별 통지를 갈음할 수 있습니다.

제5장 회원정보관리

제25조(회원정보 수집)
① 회사는 적법하고 공정한 수단에 의하여 서비스이용계약의 성립 및 이행에 필요한 최소한의 회원정보를 수집합니다.
② 회사는 회원에게 보다 나은 서비스를 제공하기 위해 추가정보를 수집할 수 있고, 이 경우 회원의 동의를 얻어야 합니다.

제26조(수집의 범위)
① 회사는 회원가입신청시 기본적인 서비스 제공을 위해 이름, 아이디, 비밀번호, e-mail 주소, 거주지 주소(우편번호 포함), 전화번호, 이동전화번호 등에 관한 회원정보를 수집합니다.
② 회사는 회원의 기본적 인권을 현저하게 침해할 우려가 있는 내용은 수집하지 않습니다.

제27조(회원정보의 보유 및 이용기간, 파기)

[당사/본인]은 SK텔레콤㈜와 거래를 함에 있어 SK텔레콤㈜의 ESG 행동규범 실천에 적극 협조하고, 공정하고 투명한 거래문화를 정착시키기 위하여 아래의 사항에 동의하고 이에 기명 날인한다.

1. [환경경영] SK텔레콤㈜와 거래와 관련하여 환경보호에 대한 책임을 인식하고 친환경 기술의 개발과 확산을 촉진해야 하며 기후변화에 따른 생물다양성 보호와 산림훼손 방지를 위해 노력해야 한다. 또한, 기업운영으로 발생되는 환경오염과 관련하여, 폐기물, 재활용, 산업용수 관리와 재사용, 온실가스 및 대기배출 물질 관리 등 환경관련 법률 및 규정을 준수해야 한다.

1-1. [환경경영 목표수립] 환경경영의 핵심영역인 폐기물 관리, 토양·소음·악취, 친환경 제품, 유해물질 관리, 원부자재, 온실가스 배출, 에너지 소비, 물관리, 대기오염 물질에 대한 내부 관리목표를 수립하고, 환경경영 추진을 위한 담당 조직 체계를 보유하고 있어야 하며, 필요할 경우 전 사업장에 요구되는 환경 관련 인증 및 인허가를 취득하여야 한다.

1-2. [친환경 제품/서비스] 친환경 기술의 개발과 확산을 통하여 친환경 제품 및 서비스를 확대해 나가고, 친환경 제품 및 서비스 인증을 취득하기 위해 노력하여야 한다.

1-3. [기후변화 대응] 전사 및 사업장 단위로 에너지 소비 유형별로 사용량을 측정하고, 온실가스 배출량도 유형별로 측정하고 파악해야 한다. 또한, 에너지 사용 효율화 시스템을 도입하고, 온실가스 배출을 저감할 수 있는 체계를 도입하여야 한다. 또한, 신재생 에너지법에 따른 재생에너지 사용량을 측정하여야 한다.

1-4. [오염 방지 및 폐기물] 공정상 배출되는 폐기물 배출량을 체계적으로 측정, 절감 및 폐기/재활용하고, 폐기물 배출량 절감을 위한 시스템을 도입하고 이후 재활용을 증진하기 위한 활동을 실시해야 한다. 또한, 유해물질의 전 과정에 대한 안전성 관리기준을 수립하고, 취급 단계별로 자체 및 제3자 점검을 실시해야 한다. 또한, 제품에 함유된 유해물질에 대한 모니터링을 실시하고, 공정상 배출되는 유해물질을 측정하여야 한다. 또한, 대기오염물질 배출량을 측정하고 필요시 전체 사업장에 대해 대기오염물질 배출량을 저감하기 위한 설비를 도입해야 한다.

1-5. [자연자본] 소음/토양오염/악취/생물다양성 등 사업장 인근 지역 생태계의 부정적인 영향을 파악 및 모니터링 관리하고, 원자재 사용량 절감을 위한 시스템을 도입하고, 재활용 원자재 사용량을 측정하여야 한다.  또한, 물관리를 위해 용수 사용량 절감, 폐수 방출/폐기시 수질오염물질 처리를 위한 시스템을 도입하여야 한다. 그리고, 필요시 용수 단계별 취수량, 재활용량, 방류량을 측정해야 한다.

2. [보건/안전경영] SK텔레콤㈜와 거래와 관련하여 업무상 이루어지는 모든 활동에서 근로자(중대재해처벌법에 따른 ‘종사자’를 의미하며, 이하 [보건/안전경영] 규정에서 동일하게 적용함)의 안전보건을 보장하는 활동이 필수적이라는 점을 인식해야 한다. 또한, 중대재해처벌법 등 관련 법률 및 규정에 따라 안전하고 건강한 사업장을 구축하고 유지하기 위해 노력해야 한다.

2-1. [산업안전] 근로자가 잠재적 안전 위험요인(예: 감전, 화재, 차량, 추락위험 등)에 노출되는 것을 통제하기 위해 적절한 행정적 통제, 예방적 차원의 유지관리와 동시에 지속적인 안전교육을 실시해야 한다. 상기 명시된 수단으로 위험요인을 충분히 통제할 수 없는 경우에는 근로자에게 적절한 개인 보호장비를 제공해야 한다. 근로자는 안전문제 관련 우려사항을 경영진에게 자유롭게 제기할 수 있어야 한다. 또한, 잠재적으로 발생 가능한 비상상태와 사고를 사전에 파악하고 평가해야 한다. 비상사태 발생 시 보고, 근로자 공지 및 대피절차 등을 마련하고, 비상사태 예방을 위한 근로자 대상 비상대피훈련, 탈출시설, 화재감지 및 소화장비 확보 등을 통하여 비상사태로 인한 피해를 최소화해야 한다.

2-2. [산업재해 및 질병] 근로자가 오랜 시간 반복적으로 수작업을 해야 하거나, 무거운 것을 들거나 서있는 작업, 그리고 체력소모가 많은 조립업무를 포함하여 근로자가 육체적으로 힘든 작업에 노출되는 것을 파악하고, 평가하며, 통제해야 한다. 또한, 근로자를 대상으로 적절한 안전보건 교육을 실시해야 하며, 교육은 근로자가 주로 사용하는 언어로 이루어져야 한다.  사업장 내 안전보건 관련 정보는 눈에 잘 띄는 곳에 게시되어야 한다.

2-3. [위생, 식품 및 주거] 위생시설(화장실, 식수, 위생적인 식품 조리 및 보관 시설, 식당 시설 등)에 대한 위생을 주기적으로 관리하고, 기숙사 운영 시 청결 및 비상 출구, 난방/환기 장치, 개인공간 확보 등 안전관리체계를 구축해야 한다.

2-4. [보건/안전 커뮤니케이션] 사업장에 근무하는 모든 근로자들을 대상으로 보건/안전 관련 산업안전교육을 주기적으로 실시함으로써 근로자의 안전보건의식을 고취시켜야 한다.

3. [노동/인권경영] 기업운영 과정에서 국제사회에서 통용되는 수준으로 내부 구성원의 인권을 보호하고 이들의 존엄성을 보장해야 한다. 내부 구성원은 임시근로자, 이주근로자, 실습생, 파견근로자 등 모든 형태의 근로자를 포함한다.

3-1. [강제노동 금지] 강제근로자, 인신구속 계약(채무변제를 위한 속박 포함)에 따른 근로자, 비자발적 죄수근로자, 인신매매 근로자를 고용해서는 안된다. 여기에는 노동력 착취를 목적으로 협박, 강요, 강제, 납치, 사기 등으로 사회적 약자를 이동, 채용, 전근시키는 등의 모든 행위가 포함된다. 근로자에게 고용조건으로 정부가 발행한 신분증, 여권 또는 근로허가증의 양도를 요구해서는 안된다. 협력회사 또는 인력 파견회사는 근로자에게 수수료(예: 취업알선 등) 또는 보증금을 요구해서는 안된다. 또한, 반드시 근로자가 이해할 수 있는 언어로 근로조건을 문서화하고 전달해야 한다.

3-2. [아동노동 금지] 아동노동은 엄격하게 금지된다. "아동"은 15세, 의무교육이 끝나는 연령, 관련 법령에 따른 법정 고용 최저연령 중 가장 높은 연령 미만의 사람을 의미한다. 아동 근로자가 발견된 경우, 즉각적인 대응조치를 취해야 한다. 즉시 아동 근로자 고용을 중지하고 고용과정에서 근로자들의 연령 검증 프로세스를 개선해야 한다. 실습생 프로그램 등을 운용할 경우 관련 법률 및 규정을 준수해야 한다. 법정 고용 최저연령보다 높은 청소년 근로자를 고용할 수 있으나, 18세 미만의 근로자들은 안전보건 측면에서 위험한 업무 (잔업, 야간근무 포함)을 수행해서는 안된다.

3-3. [근로시간 준수] 주당 근로시간은 법으로 규정한 최대 근무시간을 초과해서는 안된다. 나아가, 비상사태 또는 특수상황을 제외하고 주당 근로시간은 연장 근로시간을 포함하여 근로기준법에서 제시하는 근로시간을 넘어서는 안된다.

3.4. [임금/복리후생] 근로자에게 지급되는 임금은 최저임금, 초과근로수당, 법으로 정해진 4대보험 및 복리후생 항목 등을 포함해야 하며 관련 법률 및 규정을 모두 준수해야 한다. 모든 초과근로는 근로자의 동의 하에 자발적으로 이루어져야 하며, 관련 법률 및 규정에 따라 정규 근로시간에 적용되는 시간당 급여보다 높은 초과근로 수당을 지급해야 한다. 징계조치의 수단으로 임금 삭감은 허용되지 않으며, 근로자의 임금 지급기준 및 항목은 급여명세서 또는 급여지급 내역이 기록된 서면, 사내 인트라넷 등을 통해 근로자가 이해할 수 있는 언어로 제공되어야 한다.

3.5. [인도적 대우] 근로자에 대한 성희롱, 성적학대, 체벌, 정신적 또는 신체적 강압, 욕설을 포함한 거칠고 비인도적인 대우가 있어서는 안되며, 또한 그러한 대우를 하겠다는 위협이 있어서도 안된다. 또한, 근로자에 대한 인도적 대우를 보장하는 방침과 절차를 규정하고 근로자에게 이를 충분히 설명해야 한다.

3.6. [차별/괴롭힘 금지] 근로자가 괴롭힘이나 불법적인 차별을 받지 않도록 조치해야 한다. 채용과정과 임금, 승진, 보상, 교육기회 등의 고용 관행에 있어 인종, 피부색, 나이, 성별, 성적 성향, 민족성, 장애, 임신, 종교, 정치 성향, 조합원 신분, 결혼 여부 등에 근거해 차별을 두어서는 안된다. 관련 법률 또는 사업장 안전을 위해 요구되는 예외의 경우를 제외하고, 근로자 또는 채용 후보자에게 차별의 근거로 사용될 수 있는 의료검사를 요구할 수 없다.

3.7. [결사의 자유] 관련 법규에 따라, 근로자가 사원협의회 또는 노동조합을 조직 가입하고, 단체협약과 평화적 집회를 위해 다른 근로자와 자유롭게 결사할 권리를 존중해야 하며, 근로자가 이와 같은 활동에 참여하지 않을 권리도 존중해야 한다. 또한 근로자 및 근로자 대표가 차별대우, 보복조치, 위협행위, 괴롭힘 등에 대한 걱정 없이 근로조건과 경영방침에 대한 의견 및 애로사항을 회사와 자유롭게 소통하고 의견을 나눌 수 있어야 한다.

4. [윤리경영] SK텔레콤㈜와 거래와 관련하여 가장 높은 수준의 윤리기준을 유지하며, 관련 법률 및 규정을 준수해야 한다.

4-1. [사업 청렴성] SK텔레콤㈜와의 거래와 관련하여 거래의 성립, 유리한 거래 조건의 설정 등 거래에 영향을 미칠 목적으로 SK텔레콤㈜ 임직원에게 어떠한 금품 접대 편의도 직접 또는 제3자를 통하여 제공하지 않는다. 또한, SK텔레콤㈜의 임직원이 거래와 관련하여 금품, 접대, 편의 등의 제공을 요청하는 경우에는 지체없이 SK텔레콤㈜의 윤리상담센터(https://ethics.sk.co.kr, Fax: 02-2121-1959)에 신고한다.

4-2. [공정거래] SK텔레콤㈜와의 거래에서 다른 사업자와 담합행위 등 불공정 거래행위를 하지 않는다. 또한, 과장광고, 거짓광고, 담합 등 공정거래 법규 위반 금지 관련 내부 규정을 보유 시행한다.

4-3. [개인정보 보호] SK텔레콤㈜와의 거래관계에서 알게 된 SK텔레콤㈜의 가입자 정보 등을 포함한 경영정보를 사전승인 없이 다른 사업자와의 거래에 이용하거나 제3자에게 유출하지 않는다.

4-4. [정보공개] 회사의 회계/재무 현황 및 ESG 성과, 사업활동, 환경 관리 실태 등에 대한 정보는 해당 법규 및 일반적인 산업계 관행에 따라 공개되어야 한다. 공급망 내 관련 분야 실태 및 관행에 대한 기록위조나 부실 표기는 용인되지 아니한다.

4-5. [지적재산 보호] 지적재산권은 존중되어야 한다. 기술 및 노하우의 이전은 지적재산권을 보호하는 방식으로 이루어져야 한다.

4-6. [내부고발자 보호] 구성원이 비윤리 행위를 신고할 수 있는 채널을 보유하고, 내부 고발자 보호 및 보복을 금지하는 규정을 보유 시행해야 한다. SK텔레콤㈜는 관련 사안 발생시 내부고발 사실을 비밀로 유지하며, 내부고발에 대한 보복행위가 적발될 경우 엄정한 조치를 취할 것이며, 또한 제기된 문제사항에 대해 공정하게 규명하고, 해결방안을 강구할 것입니다.

4-7. [책임 있는 광물 조달] 인류와 지구의 지속가능한 미래를 위해 분쟁광물 및 책임광물에 대한 내부 관리기준을 수립하고, 기업의 책임을 다하기 위하여 노력해야 한다.

5. [ESG 진단 및 개선] 서약자의 ESG 행동규범 준수 수준 확인을 위하여 SK텔레콤㈜는 ESG 정기 진단을 실시하며, 행동규범 준수 인증을 위하여 현장방문 검증을 진행할 수 있다. 검증 과정에서 서약자는 SK텔레콤이 요청하는 관련 자료의 제출 등 모든 협조 의무를 준수해야 한다. 또한, 현장방문 검증을 통해 서약자의 ESG 개선 필요사항이 발견될 경우에 소정의 기간 내에 시정조치 및 개선계획 제출하고 시정조치 개선을 위하여 최선을 다하여야 한다.

[당사/본인]은 본 ESG 행동규범 준수 서약을 위반한 경우 SK텔레콤㈜이 그 위반 정도 및 내부기준에 따라 취하는 거래 물량 제한, 계약해지 등의 책임을 부담하는 것에 동의한다.
</textarea>

<textarea readonly="readonly">
&lt;BP 윤리실천 서약서&gt;

[      ](이하 “[당사/본인]”)은, 귀사와의 거래 관계에 있어 윤리성과 신뢰도의 확보 유지가 무엇보다 중요하다는 점을 충분히 인식 및 공감하며, 이에 부패 또는 비윤리 행위 방지를 위한 의무이행 및 책임 등에 대하여 아래와 같이 서약합니다.

                                        **** 아   래 ****

1.[당사/본인]은 (i)귀사와 진행했던 과거의 거래 관계에 있어 관련 법령 및 상관례를 위반하거나 특히 다음과 같은 부패 또는 비윤리 행위(이하 “비윤리 행위“)가 없었음을 진술 및 보장하고(비윤리행위로 인해 제재를 받고 제재 기간이 종료된 건은 제외), (ii)향후 거래(현재 귀사와 진행 중인 거래 및 장래 귀사와 체결하는 계약에 따라 이뤄지는 모든 거래를 포함함)를 진행함에 있어 관련 법령 및 상관례 위반이나 비윤리 행위가 발생하지 않도록 할 것을 서약합니다. 또한, [당사/본인]은 (iii)타사 및 제3자와의 거래 행위에 있어서도 기업 윤리와 신뢰도에 악영향을 미치는 일체의 비윤리 행위를 하지 않을 것임을 확약합니다.

가. 귀사 소속 임직원 및 귀사 소속 기업집단(에스케이) 내 계열회사 소속 임직원에 대한 금품, 향응, 접대 및 기타 금전적/비금전적 이익 제공 또는 수수 행위. 이익 제공 또는 수수와 관련한 비윤리 행위의 구체적인 유형은 다음과 같되, 그에 한정되지 않음
① 사회상규에 위배되는 뇌물, 향응, 접대 제공 또는 수수 행위
② 합리적인 근거 없이 화폐, 유가증권, 기타 물품을 제공 또는 수수하는 행위
③ 부채의 탕감 또는 제3자에 대한 부채의 상환 행위, 비전형적인 동산/부동산 거래*
④ 금전소비대차 및 물적, 인적 담보제공 거래
⑤ 기타 체결 형태를 불문하고 장래에 대한 보장(퇴직 후 고용 및 취업 알선, 거래 계약 체결 등)에 대한 약속 등
나. [당사/본인]의 동종, 경쟁업체와의 입찰 담합 등 불공정행위
다. 계약 체결과 관련하여 고의로 중요정보를 허위로 기재하거나 누락하는 행위
라. 기타 귀사 또는 귀사 소속 임직원을 대상으로 하는 형사적 범죄에 해당하는 행위

2.비윤리 행위 발생(귀사와의 과거 거래와 관련된 비윤리 행위의 사후적 적발을 포함)시, 귀사가 [당사/본인]의 비윤리 행위 발생 사실 및 당해 비윤리 행위의 구체적인 내용에 관한 정보(이하 “비윤리 행위 관련 정보”)를 귀사 및 귀사 소속 기업집단(에스케이) 내 모든 계열회사(이하 “비윤리 행위 관련 정보 공유 계열사”)에게 통지하는 것에 동의합니다. [당사/본인]은 이러한 통지 및 그 결과 발생하는 비윤리 행위 관련 정보의 공유가 귀사의 비밀유지 의무 위반에 해당하지 않고 [당사/본인]의 영업비밀에 대한 침해에도 해당하지 않음을 확인합니다.

3. [당사/본인] 은 귀사 및 비윤리 행위 관련 정보 공유 계열사가 비윤리 행위 타사 및 제 3 자와의 거래와 관련하여 발생한 것으로서 공개적으로 알려진 당사의 비윤리 행위도 포함 를 근거로, 당사 본인 과의 거래 장래 발생되는 입찰에 대한 참가를 포함하되 이에 한정되지 않음 에 대한 제재조치 계약 갱신 거절 , 신규 거래 제한을 의미하되 비윤리 행위가 발생한 거래의 직접적인 당사자인 귀사의 경우에는 반드시 그에 한정되지 않고 해당 비윤리 행위에 상응하는 합당한 제재조치를 의미함 를 할 수 있음에 동의하고 이와 관련하여 귀사 및 비윤리 행위 관련 정보 공유 계열사를 상대로 민사상 , 형사상의 책임을 추궁하는 등 어떠한 이의제기도 하지 않을 것임을 확인합니다

*정당한 근거 없이 통상적인 시가와 상당한 차이가 있는 금액으로 거래가격을 결정하는 거래 또는 이에 준하는 정도의 비전형적인 동산 및 부동산 거래
</textarea>
