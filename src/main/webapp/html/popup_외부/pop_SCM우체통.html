<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SKT Open2u 구매시스템</title>
        <!-- css -->
        <link rel="stylesheet" href="../../resource/css/jquery-ui.css" />
        <link rel="stylesheet" href="../../resource/css/jquery-ui.theme.css" />
        <link rel="stylesheet" href="../../resource/css/ui.jqgrid.css" />
        <link rel="stylesheet" href="../../resource/css/alopex3/alopex_grid.css" />
        <link rel="stylesheet" href="../../resource/css/ui.common.css" />
        <!-- javascript -->
        <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
        <script src="../../resource/lib/jQuery/jquery-ui.js"></script>
        <script src="../../resource/lib/jQuery/jquery.jqgrid.min.js"></script>
        <script src="../../resource/lib/Alopex/alopex-grid.min.js"></script>
        <script src="../../resource/lib/Alopex/alpopex_data.js"></script>
        <script src="../../resource/js/ui.common.js"></script>
    </head>

    <body>
        <div class="pop_header_area">
            <div class="pop_top_area">
                <div class="left">
                    <h2 class="pop_title">SCM우체통</h2>
                </div>
                <div class="right"></div>
            </div>
        </div>
        <div class="popcontents">
            <div class="comment">
                <div class="commnet-body">
                    <ul>
                        <li>상담 주신 내용에 회신을 받으시려면 회신여부 체크 후 메일주소를 남겨주세요.</li>
                    <li>
                        회사소개나 사업기회 요청은 접수하지 않습니다.
                    </li>
                    </ul>
                </div>
            </div>
            <ul class="reservation_txt">
                <li><textarea rows="2" placeholder="제목을 입력해주세요(필수)" style="height: 40px;"></textarea></li>
                <li><textarea rows="5" placeholder="내용을 10자 이상 입력해주세요(필수)" style="height: 120px"></textarea></li>
            </ul>
            <ul class="form_list">
                <li>
                    <span class="label">
                        회신여부
                        <span class="chk type02">
                            <input type="checkbox" id="chk01">
                            <label for="chk01"></label>
                        </span>
                    </span>
                    <input type="text" class="inpt wp100" placeholder="메일주소(일반 메일 권장)">
                </li>
                <li>
                    <span class="label">첨부파일</span>
                    <div class="form_file_box">
                        <input type="text" class="readonly dashed wp100" readonly="readonly">
                        <a href="javascript:;" class="btnS closes"></a>
                        <label for="file01" class="btn c_type03">파일찾기</label>
                    </div>
                </li>
            </ul>

            <div class="lay_pop_btn">
                <button type="button" class="btn c_type10">취소</button>
                <button type="button" class="btn c_type07">확인</button>
            </div>
        </div>
    </body>
</html>
