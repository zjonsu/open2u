<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SKT Open2u 구매시스템</title>
        <!-- css -->
        <link rel="stylesheet" href="../../resource/css/jquery-ui.css" />
        <link rel="stylesheet" href="../../resource/css/jquery-ui.theme.css" />
        <link rel="stylesheet" href="../../resource/css/ui.jqgrid.css" />
        <link rel="stylesheet" href="../../resource/css/alopex3/alopex_grid.css" />
        <link rel="stylesheet" href="../../resource/css/ui.common.css" />
        <!-- javascript -->
        <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
        <script src="../../resource/lib/jQuery/jquery-ui.js"></script>
        <script src="../../resource/lib/jQuery/jquery.jqgrid.min.js"></script>
        <script src="../../resource/lib/Alopex/alopex-grid.min.js"></script>
        <script src="../../resource/lib/Alopex/alpopex_data.js"></script>
        <script src="../../resource/js/ui.common.js"></script>
    </head>

    <body>
        <div class="pop_header_area">
            <div class="pop_top_area">
                <div class="left">
                    <h2 class="pop_title">회원가입</h2>
                </div>
                <div class="right"></div>
            </div>
        </div>
        <div class="popcontents">
            <ul class="member_join_step">
                <li class="off">
                    <div class="member_step step01">
                        <span>약관동의</span>
                    </div>
                </li>
                <li class="on">
                    <div class="member_step step02">
                        <span>회원인증</span>
                    </div>
                </li>
                <li>
                    <div class="member_step step03">
                        <span>기본정보</span>
                    </div>
                </li>
                <li>
                    <div class="member_step step04">
                        <span>거래희망영역</span>
                    </div>
                </li>
                <li>
                    <div class="member_step step05">
                        <span>대금지급바로</span>
                    </div>
                </li>
            </ul>

            <div class="member_join_inpt">
                <h3>개인회원</h3>
                <ul class="idpw_sch_inpt">
                    <li><input type="text" placeholder="고객명을 입력해주세요"></li>
                    <li><input type="text" placeholder="이메일을 입력해주세요"></li>
                </ul>

                <div class="lay_pop_btn">
                    <button type="button" class="btn c_type07">중복 확인</button>
                </div>
            </div>
        </div>

    </body>
</html>
